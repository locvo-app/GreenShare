<script type="text/babel">
    // --- PHẦN 1: CẤU HÌNH FIREBASE CỦA BẠN ---
    const firebaseConfig = {
        apiKey: "AIzaSyCKazmR3gsDpEc0z9ggeXAbhldLKX4V_Y8",
        authDomain: "greenshare-app-5223a.firebaseapp.com",
        projectId: "greenshare-app-5223a",
        storageBucket: "greenshare-app-5223a.firebasestorage.app",
        messagingSenderId: "695364858101",
        appId: "1:695364858101:web:2d8aaee858b9fef79c614b",
        measurementId: "G-TPVBK90J73"
    };

    // Import Firebase từ CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, onSnapshot, limit, where, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const { useState, useEffect, useMemo } = React;

    // --- CÁC ICON ---
    const Icon = ({ name, size = 20, className = "" }) => {
        return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
    };

    // --- APP CHÍNH ---
    function App() {
        const [view, setView] = useState('explore');
        const [user, setUser] = useState(null);
        const [profile, setProfile] = useState(null);
        const [listings, setListings] = useState([]);
        const [selectedItem, setSelectedItem] = useState(null);
        const [regForm, setRegForm] = useState({ name: '', phone: '', address: '' });

        useEffect(() => {
            lucide.createIcons();
            signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => {
                setUser(u);
                if (u) {
                    onSnapshot(doc(db, 'users', u.uid), (sn) => { if (sn.exists()) setProfile(sn.data()); });
                }
            });
            onSnapshot(query(collection(db, 'listings'), limit(20)), (s) => {
                setListings(s.docs.map(d => ({ id: d.id, ...d.data() })));
            });
        }, []);

        useEffect(() => { lucide.createIcons(); }, [view, selectedItem, listings]);

        const handleRegister = async (e) => {
            e.preventDefault();
            await setDoc(doc(db, 'users', user.uid), { ...regForm, heart: 10, leaf: 10 });
            setView('explore');
        };

        return (
            <div className="max-w-md mx-auto min-h-screen bg-white pb-24">
                {/* Header */}
                <header className="p-6 border-b flex justify-between items-center sticky top-0 bg-white z-50">
                    <div className="flex items-center gap-2">
                        <div className="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">G</div>
                        <h1 className="text-xl font-black text-emerald-900">GreenShare</h1>
                    </div>
                    <button onClick={() => setView('profile')} className="p-2 bg-emerald-50 rounded-xl text-emerald-600">
                        <Icon name="user" />
                    </button>
                </header>

                {/* Explore View */}
                {view === 'explore' && (
                    <div className="p-6 grid grid-cols-2 gap-4 animate-in">
                        {listings.length === 0 && <p className="col-span-2 text-center text-slate-400 py-10 font-bold">Đang tải quà tặng...</p>}
                        {listings.map(item => (
                            <div key={item.id} onClick={() => { setSelectedItem(item); setView('details'); }} className="bg-white rounded-3xl border border-emerald-50 shadow-sm overflow-hidden active:scale-95 transition">
                                <img src={item.image || "https://placehold.co/400x300/10b981/ffffff?text=GreenShare"} className="w-full aspect-square object-cover" />
                                <div className="p-3">
                                    <h3 className="font-bold text-sm text-slate-800 line-clamp-1">{item.title}</h3>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center gap-1"><Icon name="map-pin" size={10} className="text-emerald-500"/> {item.location || "HCM"}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {/* Details View */}
                {view === 'details' && selectedItem && (
                    <div className="animate-in">
                        <div className="relative h-64 bg-emerald-100">
                            <img src={selectedItem.image} className="w-full h-full object-cover" />
                            <button onClick={() => setView('explore')} className="absolute top-4 left-4 p-2 bg-white/90 rounded-xl shadow-lg"><Icon name="chevron-left" size={24}/></button>
                        </div>
                        <div className="p-8 -mt-8 bg-white rounded-t-[40px] shadow-2xl space-y-6">
                            <h1 className="text-2xl font-black text-slate-800">{selectedItem.title}</h1>
                            <div className="p-5 bg-slate-50 rounded-3xl space-y-4 text-sm font-bold text-slate-600">
                                <p className="flex items-center gap-3"><Icon name="map-pin" className="text-emerald-500"/> 📍 Nơi nhận: {selectedItem.location}</p>
                                <p className="flex items-center gap-3 border-t pt-4"><Icon name="clock" className="text-emerald-500"/> ⏰ Thời gian: {selectedItem.pickupTime || "Thỏa thuận"}</p>
                            </div>
                            <p className="italic text-slate-500 text-sm">"{selectedItem.description}"</p>
                            <button onClick={() => profile ? alert("Đăng ký thành công!") : setView('register')} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition">ĐĂNG KÝ NHẬN QUÀ</button>
                        </div>
                    </div>
                )}

                {/* Profile/Register View */}
                {view === 'profile' && !profile && setView('register')}
                {view === 'register' && (
                    <div className="p-8 flex flex-col items-center justify-center min-h-[70vh] animate-in text-center">
                        <div className="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center text-white mb-6 shadow-xl"><Icon name="shield-check" size={32}/></div>
                        <h2 className="text-2xl font-black text-emerald-900 mb-2">Gia nhập cộng đồng</h2>
                        <p className="text-slate-400 font-bold text-sm mb-8">Ký cam kết để bắt đầu trao tặng</p>
                        <form onSubmit={handleRegister} className="w-full space-y-4">
                            <input required className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none border-2 border-transparent focus:border-emerald-500" placeholder="Họ và tên thật..." value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} />
                            <input required className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none border-2 border-transparent focus:border-emerald-500" placeholder="Số điện thoại..." value={regForm.phone} onChange={e => setRegForm({...regForm, phone: e.target.value})} />
                            <div className="p-4 bg-blue-50 rounded-2xl text-[10px] font-bold text-blue-700 text-left">
                                <p>✅ Tôi cam kết không bán lại quà tặng.</p>
                                <p>✅ Tôi cam kết lịch sự khi giao nhận.</p>
                            </div>
                            <button type="submit" className="w-full py-4 bg-emerald-600 text-white rounded-xl font-black shadow-xl">XÁC NHẬN & THAM GIA</button>
                        </form>
                    </div>
                )}

                {/* Tab Bar */}
                <nav className="fixed bottom-6 left-6 right-6 h-16 bg-slate-900 rounded-3xl shadow-2xl flex items-center justify-around px-4 z-[100]">
                    <button onClick={() => setView('explore')} className={`p-3 rounded-xl ${view === 'explore' ? 'text-emerald-400 bg-white/10' : 'text-slate-500'}`}><Icon name="globe" /></button>
                    <button onClick={() => profile ? alert("Dùng bản chính thức để đăng quà!") : setView('register')} className="w-12 h-12 bg-emerald-500 text-white rounded-xl shadow-lg -mt-10 border-4 border-white"><Icon name="plus" /></button>
                    <button onClick={() => setView('profile')} className={`p-3 rounded-xl ${view === 'profile' ? 'text-emerald-400 bg-white/10' : 'text-slate-500'}`}><Icon name="user" /></button>
                </nav>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
