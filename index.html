<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GreenShare - Trao Tặng Tử Tế</title>
    
    <!-- 1. Thư viện giao diện & Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 2. React & Babel (Biên dịch code ngay tại máy người dùng) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 3. Firebase (Bản Compat để chạy trực tiếp không cần Build) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <!-- Thông báo nếu app chưa tải xong -->
        <div class="flex items-center justify-center min-h-screen text-emerald-600 font-bold">
            Đang khởi động GreenShare...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE CONFIG (CỦA RIÊNG BẠN) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKazmR3gsDpEc0z9ggeXAbhldLKX4V_Y8",
            authDomain: "greenshare-app-5223a.firebaseapp.com",
            projectId: "greenshare-app-5223a",
            storageBucket: "greenshare-app-5223a.firebasestorage.app",
            messagingSenderId: "695364858101",
            appId: "1:695364858101:web:2d8aaee858b9fef79c614b"
        };

        // Khởi tạo
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [view, setView] = useState('explore');
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [listings, setListings] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null);

            useEffect(() => {
                auth.signInAnonymously();
                auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) {
                        db.collection('users').doc(u.uid).onSnapshot(sn => {
                            if (sn.exists) setProfile(sn.data());
                        });
                    }
                });
                db.collection('listings').limit(20).onSnapshot(s => {
                    setListings(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, []);

            const renderExplore = () => (
                <div className="p-5 animate-in">
                    <div className="grid grid-cols-2 gap-4">
                        {listings.map(item => (
                            <div key={item.id} onClick={() => { setSelectedItem(item); setView('details'); }} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-emerald-50 active:scale-95 transition">
                                <img src={item.image || "https://placehold.co/400x400/10b981/ffffff?text=Qua+Tang"} className="w-full aspect-square object-cover" />
                                <div className="p-3">
                                    <h3 className="font-bold text-sm text-slate-800 line-clamp-1">{item.title}</h3>
                                    <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase">📍 {item.location}</p>
                                </div>
                            </div>
                        ))}
                        {listings.length === 0 && <p className="col-span-2 text-center py-20 text-slate-400">Đang tìm quà tặng xung quanh bạn...</p>}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-24 shadow-2xl relative">
                    <header className="p-5 border-b flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-black text-xl italic shadow-lg">G</div>
                            <h1 className="text-xl font-black text-emerald-900 tracking-tight">GreenShare</h1>
                        </div>
                        <button onClick={() => setView('profile')} className="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600 border border-emerald-100">
                           {profile ? profile.heart + "❤️" : "👤"}
                        </button>
                    </header>

                    {view === 'explore' && renderExplore()}
                    
                    {view === 'details' && selectedItem && (
                        <div className="animate-in">
                            <img src={selectedItem.image} className="w-full h-64 object-cover" />
                            <div className="p-8 -mt-10 bg-white rounded-t-[48px] shadow-2xl space-y-6">
                                <button onClick={() => setView('explore')} className="text-emerald-600 font-bold mb-2 flex items-center gap-1">← Quay lại</button>
                                <h1 className="text-2xl font-black text-slate-800">{selectedItem.title}</h1>
                                <div className="p-6 bg-slate-50 rounded-[32px] space-y-4 text-sm font-bold text-slate-600">
                                    <p>📍 Nơi nhận: {selectedItem.location}</p>
                                    <p>⏰ Thời gian: {selectedItem.pickupTime}</p>
                                </div>
                                <p className="italic text-slate-500">"{selectedItem.description}"</p>
                                <button onClick={() => alert("Chức năng đang chờ kích hoạt bản chính thức!")} className="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl">ĐĂNG KÝ NHẬN QUÀ</button>
                            </div>
                        </div>
                    )}

                    {view === 'profile' && (
                        <div className="p-8 animate-in text-center flex flex-col items-center justify-center min-h-[60vh]">
                            <div className="w-20 h-20 bg-emerald-600 rounded-3xl flex items-center justify-center text-white mb-6 text-3xl shadow-xl">👤</div>
                            <h2 className="text-2xl font-black text-emerald-900">Chào bạn!</h2>
                            <p className="text-slate-400 font-bold mt-2 mb-8">Hệ thống đang lưu trữ thành tích của bạn qua tài khoản ẩn danh.</p>
                            <button onClick={() => setView('explore')} className="px-10 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">TIẾP TỤC DẠO QUANH</button>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-6 right-6 h-16 bg-slate-900 rounded-[28px] shadow-2xl flex items-center justify-around z-40 border border-white/10">
                        <button onClick={() => setView('explore')} className={`p-4 ${view === 'explore' ? 'text-emerald-400' : 'text-slate-500'}`}>🌍</button>
                        <button onClick={() => alert("Vui lòng dùng bản thực để đăng quà!")} className="w-12 h-12 bg-emerald-500 text-white rounded-2xl shadow-lg -mt-10 border-4 border-white flex items-center justify-center font-bold text-2xl">＋</button>
                        <button onClick={() => setView('profile')} className={`p-4 ${view === 'profile' ? 'text-emerald-400' : 'text-slate-500'}`}>👤</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
