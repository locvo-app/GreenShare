<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GreenShare - Cộng Đồng Trao Tặng</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .shadow-soft { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CẤU HÌNH FIREBASE (CHÍNH CHỦ CỦA BẠN) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKazmR3gsDpEc0z9ggeXAbhldLKX4V_Y8",
            authDomain: "greenshare-app-5223a.firebaseapp.com",
            projectId: "greenshare-app-5223a",
            storageBucket: "greenshare-app-5223a.firebasestorage.app",
            messagingSenderId: "695364858101",
            appId: "1:695364858101:web:2d8aaee858b9fef79c614b"
        };

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Icon Component Helper
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- APP CHÍNH ---
        function App() {
            const [view, setView] = useState('explore'); 
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [listings, setListings] = useState([]);
            const [historyGiving, setHistoryGiving] = useState([]);
            const [historyReceiving, setHistoryReceiving] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [activeTab, setActiveTab] = useState('new');
            
            // Form States
            const [regForm, setRegForm] = useState({ name: '', phone: '', address: '', ok1: false, ok2: false });
            const [giftForm, setGiftForm] = useState({ 
                title: '', desc: '', location: '', logistics: 'receiver_pickup', 
                shipPolicy: 'receiver_pays', pickupTime: '08:00 - 10:00', eventDate: '', image: null 
            });
            const [applyForm, setApplyForm] = useState({ message: '', address: '' });
            const fileInputRef = useRef();

            // Khởi tạo & Lắng nghe dữ liệu
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        // Lắng nghe hồ sơ cá nhân
                        db.collection('users').doc(u.uid).onSnapshot(sn => setProfile(sn.exists ? sn.data() : null));
                        // Lắng nghe lịch sử tặng quà
                        db.collection('listings').where('ownerId', '==', u.uid).onSnapshot(sn => {
                            setHistoryGiving(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                        // Lắng nghe lịch sử yêu cầu nhận quà
                        db.collection('requests').where('requesterId', '==', u.uid).onSnapshot(sn => {
                            setHistoryReceiving(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                    } else {
                        setProfile(null);
                    }
                });

                const unsubListings = db.collection('listings').orderBy('createdAt', 'desc').onSnapshot(sn => {
                    setListings(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubAuth(); unsubListings(); };
            }, []);

            // --- HÀNH ĐỘNG ---
            const handleSignIn = () => auth.signInAnonymously().then(() => setView('explore'));
            const handleSignOut = () => auth.signOut().then(() => setView('explore'));

            const handleRegister = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                await db.collection('users').doc(user.uid).set({ ...regForm, heart: 10, leaf: 10, createdAt: Date.now() });
                setIsSubmitting(false); setView('explore');
            };

            const handleCreateGift = async (e) => {
                e.preventDefault();
                if (!profile) return setView('register');
                setIsSubmitting(true);
                await db.collection('listings').add({
                    ...giftForm, ownerId: user.uid, ownerName: profile.name,
                    status: 'available', requestCount: 0, createdAt: Date.now()
                });
                await db.collection('users').doc(user.uid).update({ heart: (profile.heart || 0) + 10 });
                setIsSubmitting(false); setView('success');
            };

            const handleApply = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                await db.collection('requests').add({
                    listingId: selectedItem.id, listingTitle: selectedItem.title, 
                    requesterId: user.uid, name: profile.name, message: applyForm.message,
                    address: applyForm.address || profile.address, createdAt: Date.now(), status: 'pending'
                });
                await db.collection('listings').doc(selectedItem.id).update({ requestCount: (selectedItem.requestCount || 0) + 1 });
                setIsSubmitting(false); setView('success');
            };

            const filteredList = listings.filter(l => {
                if (activeTab === 'done') return l.status === 'completed';
                return l.status !== 'completed';
            });

            // --- VIEW COMPONENTS ---
            const Nav = () => (
                <nav className="fixed bottom-6 left-6 right-6 h-16 bg-slate-900 rounded-[28px] shadow-2xl flex items-center justify-around z-40 border border-white/10">
                    <button onClick={() => setView('explore')} className={`p-4 ${view === 'explore' ? 'text-emerald-400' : 'text-slate-500'}`}><Icon name="globe" /></button>
                    <button onClick={() => user ? (profile ? setView('create') : setView('register')) : handleSignIn()} className="w-12 h-12 bg-emerald-500 text-white rounded-2xl shadow-lg -mt-10 border-4 border-white flex items-center justify-center text-2xl font-black">＋</button>
                    <button onClick={() => user ? setView('profile') : handleSignIn()} className={`p-4 ${view === 'profile' ? 'text-emerald-400' : 'text-slate-500'}`}><Icon name="user" /></button>
                </nav>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative flex flex-col">
                    <header className="p-5 bg-white border-b flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2" onClick={() => setView('explore')}>
                            <div className="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-black text-xl italic shadow-lg">G</div>
                            <h1 className="text-xl font-black text-emerald-900 tracking-tight">GreenShare</h1>
                        </div>
                        {user ? (
                            <div className="flex items-center gap-3">
                                {profile && <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg">{profile.heart} ❤️</span>}
                                <button onClick={() => setView('profile')} className="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><Icon name="user" size={18}/></button>
                            </div>
                        ) : (
                            <button onClick={handleSignIn} className="text-xs font-black text-emerald-600 uppercase tracking-widest">Đăng nhập</button>
                        )}
                    </header>

                    {/* EXPLORE */}
                    {view === 'explore' && (
                        <div className="p-5 pb-32 animate-in flex-1">
                            <div className="flex gap-2 overflow-x-auto no-scrollbar mb-6">
                                {['new', 'done'].map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`px-5 py-2 rounded-full text-[10px] font-black whitespace-nowrap transition-all ${activeTab === t ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>
                                        {t === 'new' ? '🎁 Còn quà' : '✅ Đã trao'}
                                    </button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {filteredList.map(item => (
                                    <div key={item.id} onClick={() => { setSelectedItem(item); setView('details'); }} className="bg-white rounded-[32px] border border-emerald-50 shadow-soft overflow-hidden active:scale-95 transition">
                                        <div className="relative aspect-square">
                                            <img src={item.image || "https://placehold.co/400x400/10b981/ffffff?text=GreenShare"} className="w-full h-full object-cover" />
                                            <div className="absolute bottom-2 right-2 bg-white/90 px-2 py-0.5 rounded-lg text-[8px] font-black uppercase">{(item.requestCount || 0)}/3 ĐK</div>
                                        </div>
                                        <div className="p-3">
                                            <h3 className="font-bold text-sm text-slate-800 line-clamp-1">{item.title}</h3>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">📍 {item.location}</p>
                                        </div>
                                    </div>
                                ))}
                                {filteredList.length === 0 && <p className="col-span-2 text-center py-20 text-slate-300 font-bold italic">Đang tải quà tặng...</p>}
                            </div>
                        </div>
                    )}

                    {/* DETAILS */}
                    {view === 'details' && selectedItem && (
                        <div className="animate-in pb-32 flex-1">
                            <div className="relative h-64 bg-emerald-50"><img src={selectedItem.image} className="w-full h-full object-cover" /><button onClick={() => setView('explore')} className="absolute top-4 left-4 p-2 bg-white rounded-xl shadow-lg">← Quay lại</button></div>
                            <div className="p-8 -mt-10 bg-white rounded-t-[48px] shadow-2xl space-y-6">
                                <div className="flex justify-between items-center">
                                    <span className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-black uppercase tracking-widest">{selectedItem.logistics === 'receiver_pickup' ? 'Đến lấy' : 'Gửi Ship'}</span>
                                    <span className="text-[10px] font-black text-slate-400 uppercase">Trạng thái: <span className="text-emerald-600">{selectedItem.status === 'available' ? 'Sẵn sàng' : 'Hoàn thành'}</span></span>
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 leading-tight">{selectedItem.title}</h1>
                                <div className="p-6 bg-slate-50 rounded-[32px] space-y-4 text-sm font-bold text-slate-700">
                                    <p className="flex items-center gap-2"><Icon name="map-pin" size={16}/> 📍 Nơi nhận: {selectedItem.location}</p>
                                    <p className="flex items-center gap-2"><Icon name="clock" size={16}/> ⏰ Thời gian: {selectedItem.eventDate} | {selectedItem.pickupTime}</p>
                                    {selectedItem.logistics === 'giver_sends' && <p className="text-blue-600 font-black flex items-center gap-2"><Icon name="truck" size={16}/> 🚚 Phí: {selectedItem.shipPolicy === 'giver_pays' ? 'MIỄN PHÍ' : 'BẠN TRẢ COD'}</p>}
                                </div>
                                <div className="space-y-2">
                                    <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest">Mô tả & Ghi chú</p>
                                    <p className="text-sm italic leading-relaxed text-slate-500">"{selectedItem.desc}"</p>
                                </div>
                                <div className="border-t pt-6 space-y-4">
                                    <textarea className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none text-sm" placeholder="Lời nhắn gửi tới người tặng..." onChange={e => setApplyForm({...applyForm, message: e.target.value})} />
                                    <button onClick={profile ? handleApply : () => setView('register')} disabled={isSubmitting || selectedItem.status === 'completed'} className={`w-full py-5 rounded-2xl font-black shadow-xl transition-all ${selectedItem.status === 'completed' ? 'bg-slate-200 text-slate-400' : 'bg-emerald-600 text-white active:scale-95'}`}>{selectedItem.status === 'completed' ? 'GIAO DỊCH ĐÃ KẾT THÚC' : 'ĐĂNG KÝ NHẬN QUÀ'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CREATE GIFT */}
                    {view === 'create' && (
                        <div className="p-6 pb-32 animate-in flex-1 overflow-y-auto bg-slate-50">
                            <h2 className="text-2xl font-black text-emerald-900 mb-8">Tặng quà mới</h2>
                            <form onSubmit={handleCreateGift} className="space-y-5">
                                <div onClick={() => fileInputRef.current.click()} className="h-48 bg-emerald-50 rounded-[40px] border-2 border-dashed border-emerald-200 flex flex-col items-center justify-center text-emerald-400 overflow-hidden relative">
                                    {giftForm.image ? <img src={giftForm.image} className="w-full h-full object-cover" /> : <Icon name="camera" size={32}/>}
                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={e => {
                                        const r = new FileReader(); r.onload = () => setGiftForm({...giftForm, image: r.result}); r.readAsDataURL(e.target.files[0]);
                                    }} />
                                </div>
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Tên món quà</label>
                                <input required className="w-full p-4 bg-white rounded-2xl font-bold outline-none" placeholder="..." onChange={e => setGiftForm({...giftForm, title: e.target.value})} /></div>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Địa điểm</label>
                                    <input required className="w-full p-4 bg-white rounded-2xl font-bold outline-none text-xs" placeholder="Quận/Phường" onChange={e => setGiftForm({...giftForm, location: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Ngày trao</label>
                                    <input required type="date" className="w-full p-4 bg-white rounded-2xl font-bold outline-none text-xs" onChange={e => setGiftForm({...giftForm, eventDate: e.target.value})} /></div>
                                </div>

                                <div className="space-y-3">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Giao nhận & Phí</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setGiftForm({...giftForm, logistics: 'receiver_pickup'})} className={`p-4 rounded-xl text-[10px] font-black ${giftForm.logistics === 'receiver_pickup' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-400'}`}>Tự đến lấy</button>
                                        <button type="button" onClick={() => setGiftForm({...giftForm, logistics: 'giver_sends'})} className={`p-4 rounded-xl text-[10px] font-black ${giftForm.logistics === 'giver_sends' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-400'}`}>Gửi Ship</button>
                                    </div>
                                    {giftForm.logistics === 'giver_sends' && (
                                        <div className="grid grid-cols-2 gap-2">
                                            <button type="button" onClick={() => setGiftForm({...giftForm, shipPolicy: 'giver_pays'})} className={`p-3 rounded-lg text-[9px] font-black ${giftForm.shipPolicy === 'giver_pays' ? 'border-2 border-emerald-500 text-emerald-600' : 'bg-white'}`}>Tôi trả ship (Free)</button>
                                            <button type="button" onClick={() => setGiftForm({...giftForm, shipPolicy: 'receiver_pays'})} className={`p-3 rounded-lg text-[9px] font-black ${giftForm.shipPolicy === 'receiver_pays' ? 'border-2 border-orange-500 text-orange-600' : 'bg-white'}`}>Bạn trả ship (COD)</button>
                                        </div>
                                    )}
                                </div>

                                <textarea required className="w-full p-4 bg-white rounded-2xl font-bold outline-none min-h-[100px]" placeholder="Mô tả tình trạng, ghi chú thêm..." onChange={e => setGiftForm({...giftForm, desc: e.target.value})} />
                                <button type="submit" disabled={isSubmitting} className="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl">ĐĂNG QUÀ (+10 ❤️)</button>
                            </form>
                        </div>
                    )}

                    {/* REGISTER */}
                    {view === 'register' && (
                        <div className="p-8 flex flex-col justify-center flex-1 animate-in bg-slate-50">
                            <h2 className="text-2xl font-black text-emerald-900 mb-8 text-center">Gia nhập GreenShare</h2>
                            <form onSubmit={handleRegister} className="space-y-4">
                                <input required className="w-full p-5 bg-white rounded-2xl font-black outline-none shadow-sm" placeholder="Tên thật..." value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} />
                                <input required type="tel" className="w-full p-5 bg-white rounded-2xl font-black outline-none shadow-sm" placeholder="SĐT liên hệ..." value={regForm.phone} onChange={e => setRegForm({...regForm, phone: e.target.value})} />
                                <input required className="w-full p-5 bg-white rounded-2xl font-black outline-none shadow-sm" placeholder="Địa chỉ của bạn..." value={regForm.address} onChange={e => setRegForm({...regForm, address: e.target.value})} />
                                <div className="p-5 bg-blue-50 rounded-3xl space-y-4 border border-blue-100 text-[11px] font-bold text-slate-600">
                                    <label className="flex gap-2"><input type="checkbox" required checked={regForm.ok1} onChange={e => setRegForm({...regForm, ok1: e.target.checked})}/> Cam kết KHÔNG bán lại quà cộng đồng.</label>
                                    <label className="flex gap-2"><input type="checkbox" required checked={regForm.ok2} onChange={e => setRegForm({...regForm, ok2: e.target.checked})}/> Cam kết cư xử lịch sự khi giao nhận.</label>
                                </div>
                                <button type="submit" disabled={!regForm.ok1 || !regForm.ok2 || isSubmitting} className={`w-full py-5 rounded-2xl font-black shadow-xl ${regForm.ok1 && regForm.ok2 ? 'bg-emerald-600 text-white' : 'bg-slate-200 text-slate-400'}`}>BẮT ĐẦU NGAY</button>
                            </form>
                        </div>
                    )}

                    {/* PROFILE & HISTORY */}
                    {view === 'profile' && (
                        <div className="p-8 pb-32 flex-1 animate-in bg-slate-50 overflow-y-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-2xl font-black">Hồ sơ & Lịch sử</h2>
                                <button onClick={handleSignOut} className="text-[10px] font-black text-rose-500 uppercase">Đăng xuất</button>
                            </div>
                            {profile ? (
                                <div className="space-y-8">
                                    <div className="bg-emerald-600 rounded-[48px] p-10 text-white text-center shadow-xl">
                                        <div className="w-20 h-20 bg-white/20 rounded-full mx-auto flex items-center justify-center text-3xl font-black mb-6">{profile.name[0].toUpperCase()}</div>
                                        <h3 className="text-2xl font-black">{profile.name}</h3>
                                        <div className="flex justify-center gap-4 mt-6">
                                            <div className="bg-white/20 px-3 py-1 rounded-xl text-[10px] font-black tracking-widest uppercase">{profile.heart} ❤️</div>
                                            <div className="bg-white/20 px-3 py-1 rounded-xl text-[10px] font-black tracking-widest uppercase">{profile.leaf} 🌳</div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Quà bạn đã tặng ({historyGiving.length})</h4>
                                        <div className="space-y-2">
                                            {historyGiving.map(h => (
                                                <div key={h.id} className="p-4 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                                                    <span className="text-sm font-bold truncate pr-4">{h.title}</span>
                                                    <Badge variant={h.status === 'completed' ? 'emerald' : 'blue'}>{h.status === 'completed' ? 'Xong' : 'Sẵn sàng'}</Badge>
                                                </div>
                                            ))}
                                            {historyGiving.length === 0 && <p className="text-xs italic text-slate-400 p-4">Bạn chưa tặng món quà nào.</p>}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Quà bạn đã đăng ký nhận ({historyReceiving.length})</h4>
                                        <div className="space-y-2">
                                            {historyReceiving.map(h => (
                                                <div key={h.id} className="p-4 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                                                    <span className="text-sm font-bold truncate pr-4">{h.listingTitle}</span>
                                                    <Badge variant="blue">Đã gửi ĐK</Badge>
                                                </div>
                                            ))}
                                            {historyReceiving.length === 0 && <p className="text-xs italic text-slate-400 p-4">Bạn chưa đăng ký nhận quà nào.</p>}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center py-20 bg-white rounded-[40px] border-2 border-dashed border-emerald-100"><p className="text-slate-400 font-bold mb-6">Bạn chưa tạo hồ sơ</p><button onClick={() => setView('register')} className="px-10 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">GIA NHẬP NGAY</button></div>
                            )}
                        </div>
                    )}

                    {/* SUCCESS VIEW */}
                    {view === 'success' && (
                        <div className="fixed inset-0 bg-white flex flex-col items-center justify-center p-10 text-center z-[100] animate-in">
                            <div className="text-6xl mb-6">🎉</div>
                            <h2 className="text-3xl font-black text-emerald-800">Thành công!</h2>
                            <p className="text-slate-400 font-bold mt-2">Dữ liệu đã được lưu trữ vĩnh viễn.</p>
                            <button onClick={() => setView('explore')} className="mt-12 px-12 py-4 bg-emerald-600 text-white rounded-3xl font-black shadow-xl active:scale-95">TIẾP TỤC</button>
                        </div>
                    )}

                    <Nav />

                    <style>{`
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                        input[type="date"] { appearance: none; -webkit-appearance: none; }
                        Badge { display: inline-block; }
                    `}</style>
                </div>
            );
        }

        const Badge = ({ children, variant }) => {
            const styles = { emerald: "bg-emerald-100 text-emerald-600", blue: "bg-blue-100 text-blue-600" };
            return <span className={`px-2 py-1 rounded-lg text-[8px] font-black uppercase tracking-tighter ${styles[variant]}`}>{children}</span>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
